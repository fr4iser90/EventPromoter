server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    
    # Security Headers für alle Responses
    # HINWEIS: HSTS wird hier NICHT gesetzt, da nginx nur HTTP (Port 80) hört
    # HSTS sollte im Reverse Proxy (Traefik) oder bei HTTPS-Terminierung gesetzt werden
    
    # X-Frame-Options: Verhindert Clickjacking
    add_header X-Frame-Options "DENY" always;
    
    # X-Content-Type-Options: Verhindert MIME-Sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Referrer-Policy: Steuert Referrer-Informationen
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions-Policy: Deaktiviert unnötige Browser-Features
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Content-Security-Policy: Wird vom Backend (Helmet) gesetzt für API-Requests
    # Für statische Frontend-Dateien könnte man hier auch eine CSP setzen,
    # aber das ist komplexer und sollte mit dem Frontend-Team abgestimmt werden
    
    # SPA Routing - alle Requests zu index.html außer statische Assets
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # API Proxy zum Backend
    location /api {
        proxy_pass http://backend:4000/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Security Headers werden vom Backend (Helmet) gesetzt
        # Diese werden durch den Proxy durchgereicht
    }
    
    # Statische Assets mit Cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        
        # Security Headers auch für statische Assets
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
